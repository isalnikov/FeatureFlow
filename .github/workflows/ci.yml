name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run all module tests
        run: mvn test -pl domain-core,planning-engine,data-service --batch-mode

      - name: Run JaCoCo coverage checks
        run: mvn verify -pl domain-core,planning-engine --batch-mode

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            domain-core/target/site/jacoco/
            planning-engine/target/site/jacoco/
            data-service/target/site/jacoco/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn clean package -DskipTests --batch-mode

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            data-service/target/*.jar
            planning-engine/target/*.jar
            integration-hub/target/*.jar

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: docker compose version

      - name: Validate docker-compose
        run: docker compose config
