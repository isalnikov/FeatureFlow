name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '25'
  JAVA_DIST: 'temurin'

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: featureflow_test
          POSTGRES_USER: ff
          POSTGRES_PASSWORD: ff_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: maven

      - name: Run tests with coverage
        run: mvn clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/featureflow_test
          SPRING_DATASOURCE_USERNAME: ff
          SPRING_DATASOURCE_PASSWORD: ff_secret

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: domain-core/target/site/jacoco/jacoco.xml,planning-engine/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: maven

      - name: Build JARs
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push data-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.java
          push: true
          tags: featureflow/data-service:${{ github.sha }}
          build-args: |
            JAR_FILE=data-service/target/data-service-0.1.0-SNAPSHOT.jar

      - name: Build and push planning-engine
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.java
          push: true
          tags: featureflow/planning-engine:${{ github.sha }}
          build-args: |
            JAR_FILE=planning-engine/target/planning-engine-0.1.0-SNAPSHOT.jar

      - name: Build and push integration-hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.java
          push: true
          tags: featureflow/integration-hub:${{ github.sha }}
          build-args: |
            JAR_FILE=integration-hub/target/integration-hub-0.1.0-SNAPSHOT.jar
