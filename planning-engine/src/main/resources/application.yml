server:
  port: 8081

spring:
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

featureflow:
  planning:
    annealing:
      initial-temperature: 1000.0
      cooling-rate: 0.95
      min-temperature: 0.1
      max-iterations: 10000
    weights:
      w1-ttm: 1.0
      w2-underutilization: 0.5
      w3-deadline-penalty: 2.0
    monte-carlo:
      iterations: 1000
      confidence-level: 0.95
    parallelism:
      max-features-per-team-per-sprint: 3
