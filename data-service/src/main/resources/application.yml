server:
  port: 8080
  tomcat:
    threads:
      max: 200

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/featureflow
    username: ff
    password: ff_secret
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:9090/realms/featureflow}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:9090/realms/featureflow/protocol/openid-connect/certs}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

featureflow:
  capacity:
    default-focus-factor: 0.7
    default-bug-reserve: 0.20
    default-techdebt-reserve: 0.10
  parallelism:
    max-features-per-team-per-sprint: 3
