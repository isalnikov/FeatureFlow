services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: featureflow
      POSTGRES_USER: ff
      POSTGRES_PASSWORD: ff_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ff -d featureflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  data-service:
    build:
      context: ./data-service
      dockerfile: ../docker/Dockerfile.java
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/featureflow
      SPRING_DATASOURCE_USERNAME: ff
      SPRING_DATASOURCE_PASSWORD: ff_secret
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  planning-engine:
    build:
      context: ./planning-engine
      dockerfile: ../docker/Dockerfile.java
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy

  integration-hub:
    build:
      context: ./integration-hub
      dockerfile: ../docker/Dockerfile.java
    ports:
      - "8082:8082"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
